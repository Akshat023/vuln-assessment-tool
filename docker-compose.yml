services:

  
  redis:
    image: redis:alpine
    container_name: vuln_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── OWASP ZAP ───────────────────────────────
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: vuln_zap
    user: zap

    mem_limit: 3g
    memswap_limit: 3g

    ports:
      - "8080:8080"

    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8080
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -Xmx1536m

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/JSON/core/view/version/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s


  # ── DVWA (Optional Test Target) ─────────────
  dvwa:
    image: vulnerables/web-dvwa
    container_name: vuln_dvwa

    ports:
      - "8888:80"

    restart: unless-stopped


  # ── FastAPI Backend ─────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: vuln_api

    ports:
      - "8000:8000"

    mem_limit: 512m

    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ZAP_URL=http://zap:8080
      - GROQ_API_KEY=${GROQ_API_KEY}

    depends_on:
      zap:
        condition: service_healthy

    volumes:
      - ./reports/output:/app/reports/output

    restart: unless-stopped


  # ── Celery Worker ───────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: vuln_celery

    command: python -m celery -A api.celery_app worker --loglevel=info --pool=solo

    mem_limit: 512m

    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ZAP_URL=http://zap:8080
      - GROQ_API_KEY=${GROQ_API_KEY}

    depends_on:
      zap:
        condition: service_healthy

    volumes:
      - ./reports/output:/app/reports/output

    restart: unless-stopped